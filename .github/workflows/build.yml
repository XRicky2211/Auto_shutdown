name: Build and Release

on:
  push:
    tags:
      - 'v*'          # 推送 v1.0.0、v2.3.4 等标签时触发
  workflow_dispatch:   # 允许手动触发

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller AutoShutdown.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoShutdown-${{ github.ref_name }}
          path: dist/AutoShutdown.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoShutdown-${{ github.ref_name }}

      - name: Generate release notes
        id: notes
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $notes = @"
          ## 自动关机助手 $version

          ### 下载
          - [AutoShutdown.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/AutoShutdown.exe)

          ### 安装说明
          1. 下载 `AutoShutdown.exe`
          2. 双击运行（无需安装 Python）
          3. 首次运行时如被 Windows Defender 拦截，点击"更多信息 → 仍要运行"

          ### 更新日志
          请查看 [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 获取完整更新记录。
          "@
          $notes | Out-File -Encoding utf8 release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: AutoShutdown.exe
          body_path: release_notes.md
          draft: false
          prerelease: false
          generate_release_notes: true
